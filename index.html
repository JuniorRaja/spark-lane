<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SparkLane - Idea Validation Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0a0a;
      --bg-secondary: #111111;
      --bg-tertiary: #1a1a1a;
      --border-primary: #252525;
      --border-hover: #353535;
      --text-primary: #ffffff;
      --text-secondary: #a0a0a0;
      --text-tertiary: #666666;
      --accent-primary: #2563eb;
      --accent-hover: #1d4ed8;
      --accent-glow: rgba(37, 99, 235, 0.1);
      --success: #10b981;
      --warning: #f59e0b;
      --error: #ef4444;
      --status-raw: #6b7280;
      --status-brewing: #f59e0b;
      --status-validated: #10b981;
      --status-mvp: #2563eb;
      --status-shipped: #8b5cf6;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-primary);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border-primary);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--border-hover);
    }

    /* Login Page Styles */
    #loginPage input:focus {
      outline: none;
      border-color: var(--accent-primary) !important;
      box-shadow: 0 0 0 3px var(--accent-glow) !important;
    }

    /* Header */
    .header {
      position: sticky;
      top: 0;
      background: rgba(10, 10, 10, 0.8);
      backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid var(--border-primary);
      z-index: 100;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .header.elevated {
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
    }

    .header-content {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem;
      height: 64px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 2rem;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      text-decoration: none;
      color: var(--text-primary);
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: var(--accent-primary);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 1.25rem;
    }

    .logo-text {
      font-size: 1.125rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .search-box {
      position: relative;
      display: none;
    }

    @media (min-width: 768px) {
      .search-box {
        display: block;
      }
    }

    .search-input {
      background: var(--bg-tertiary);
      border: 1px solid var(--border-primary);
      color: var(--text-primary);
      padding: 0.5rem 1rem 0.5rem 2.5rem;
      border-radius: 8px;
      width: 240px;
      font-size: 0.875rem;
      transition: all 0.2s;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px var(--accent-glow);
      width: 320px;
    }

    .search-icon {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-tertiary);
      pointer-events: none;
    }

    .btn {
      background: var(--bg-tertiary);
      color: var(--text-primary);
      border: 1px solid var(--border-primary);
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      white-space: nowrap;
    }

    .btn:hover {
      border-color: var(--border-hover);
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
    }

    .btn-primary {
      background: var(--accent-primary);
      border-color: var(--accent-primary);
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
      transform: translateY(-1px);
    }

    .btn-small {
      padding: 0.375rem 0.75rem;
      font-size: 0.8125rem;
    }

    /* Stats Bar */
    .stats-bar {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-primary);
      padding: 1rem 0;
    }

    .stats-content {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem;
      display: flex;
      justify-content: center;
      gap: 2rem;
      overflow-x: auto;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1.25rem;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-primary);
      border-radius: 10px;
      min-width: 140px;
      transition: all 0.2s;
      cursor: pointer;
    }

    .stat-item:hover {
      border-color: var(--border-hover);
      transform: translateY(-1px);
    }

    .stat-icon {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
    }

    .stat-icon.raw { background: rgba(107, 114, 128, 0.1); color: var(--status-raw); }
    .stat-icon.brewing { background: rgba(245, 158, 11, 0.1); color: var(--status-brewing); }
    .stat-icon.validated { background: rgba(16, 185, 129, 0.1); color: var(--status-validated); }
    .stat-icon.mvp { background: rgba(59, 130, 246, 0.1); color: var(--status-mvp); }
    .stat-icon.shipped { background: rgba(139, 92, 246, 0.1); color: var(--status-shipped); }

    .stat-info {
      flex: 1;
    }

    .stat-label {
      font-size: 0.75rem;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 600;
      font-family: 'JetBrains Mono', monospace;
    }

    /* Main Content */
    .main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    /* Filters */
    .filters {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 2rem;
      overflow-x: auto;
      padding-bottom: 0.5rem;
    }

    .filter-pill {
      background: var(--bg-tertiary);
      border: 1px solid var(--border-primary);
      color: var(--text-secondary);
      padding: 0.5rem 1rem;
      border-radius: 20px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .filter-pill:hover {
      border-color: var(--border-hover);
    }

    .filter-pill.active {
      background: var(--accent-primary);
      border-color: var(--accent-primary);
      color: white;
    }

    /* Ideas Grid */
    .ideas-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1.5rem;
      animation: fadeIn 0.4s ease-out;
      max-width: 100%;
      justify-content: center;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Idea Card */
    .idea-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-primary);
      border-radius: 8px;
      padding: 1.5rem;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
      animation: cardIn 0.3s ease-out backwards;
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .idea-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--border-hover);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .idea-card:hover {
      border-color: var(--border-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
    }

    .idea-card:hover::before {
      opacity: 1;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .idea-title {
      font-size: 1.125rem;
      font-weight: 600;
      line-height: 1.4;
      letter-spacing: -0.01em;
      flex: 1;
    }

    .status-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 0.5rem;
    }

    .status-indicator.raw { background: var(--status-raw); color: var(--status-raw); }
    .status-indicator.brewing { background: var(--status-brewing); color: var(--status-brewing); }
    .status-indicator.validated { background: var(--status-validated); color: var(--status-validated); }
    .status-indicator.mvp { background: var(--status-mvp); color: var(--status-mvp); }
    .status-indicator.shipped { background: var(--status-shipped); color: var(--status-shipped); }

    .idea-description {
      color: var(--text-secondary);
      font-size: 0.875rem;
      line-height: 1.6;
      margin-bottom: 1rem;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .validation-score {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-primary);
      border-radius: 8px;
      margin-bottom: 1rem;
    }

    .score-circle {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1rem;
      font-family: 'JetBrains Mono', monospace;
    }

    .score-high {
      background: rgba(16, 185, 129, 0.15);
      color: var(--success);
    }

    .score-medium {
      background: rgba(245, 158, 11, 0.15);
      color: var(--warning);
    }

    .score-low {
      background: rgba(239, 68, 68, 0.15);
      color: var(--error);
    }

    .score-info {
      flex: 1;
    }

    .score-label {
      font-size: 0.75rem;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
    }

    .score-metrics {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-top: 0.25rem;
    }

    .metric-tag {
      font-size: 0.75rem;
      padding: 0.125rem 0.5rem;
      background: var(--bg-primary);
      border-radius: 4px;
      color: var(--text-secondary);
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 1rem;
      border-top: 1px solid var(--border-primary);
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.25rem 0.75rem;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .status-badge.raw { background: rgba(107, 114, 128, 0.15); color: var(--status-raw); }
    .status-badge.brewing { background: rgba(245, 158, 11, 0.15); color: var(--status-brewing); }
    .status-badge.validated { background: rgba(16, 185, 129, 0.15); color: var(--status-validated); }
    .status-badge.mvp { background: rgba(59, 130, 246, 0.15); color: var(--status-mvp); }
    .status-badge.shipped { background: rgba(139, 92, 246, 0.15); color: var(--status-shipped); }

    .idea-date {
      font-size: 0.75rem;
      color: var(--text-tertiary);
      font-family: 'JetBrains Mono', monospace;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 6rem 2rem;
      color: var(--text-secondary);
    }

    .empty-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.5rem;
      background: var(--bg-tertiary);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
    }

    .empty-state h2 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
      color: var(--text-primary);
    }

    .empty-state p {
      font-size: 0.95rem;
      max-width: 400px;
      margin: 0 auto;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 200;
      animation: modalFadeIn 0.2s ease-out;
    }

    @keyframes modalFadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .modal.active {
      display: flex;
    }

    .modal-backdrop {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
    }

    .modal-content {
      position: relative;
      margin: auto;
      width: 90%;
      max-width: 700px;
      max-height: 90vh;
      background: var(--bg-secondary);
      border: 1px solid var(--border-primary);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      animation: modalSlideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    }

    @keyframes modalSlideUp {
      from {
        opacity: 0;
        transform: translateY(40px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .modal-header {
      padding: 1.5rem 2rem;
      border-bottom: 1px solid var(--border-primary);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
    }

    .modal-title {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .modal-actions {
      display: flex;
      gap: 0.5rem;
    }

    .modal-body {
      padding: 2rem;
      overflow-y: auto;
      flex: 1;
    }

    .modal-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--border-primary);
      padding-bottom: 0;
    }

    .tab {
      padding: 0.75rem 1.5rem;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }

    .tab:hover {
      color: var(--text-primary);
    }

    .tab.active {
      color: var(--accent-primary);
    }

    .tab.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--accent-primary);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .form-input,
    .form-textarea,
    .form-select {
      width: 100%;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-primary);
      color: var(--text-primary);
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      transition: all 0.2s;
    }

    .form-input:focus,
    .form-textarea:focus,
    .form-select:focus {
      outline: none;
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .form-textarea {
      min-height: 150px;
      resize: vertical;
      line-height: 1.6;
    }

    .form-input::placeholder,
    .form-textarea::placeholder {
      color: var(--text-tertiary);
    }

    .char-count {
      text-align: right;
      font-size: 0.75rem;
      color: var(--text-tertiary);
      margin-top: 0.25rem;
      font-family: 'JetBrains Mono', monospace;
    }

    /* AI Validation Panel */
    .validation-panel {
      background: var(--bg-tertiary);
      border: 1px solid var(--border-primary);
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .validation-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .validation-title {
      font-size: 1rem;
      font-weight: 700;
    }

    .validation-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .validation-metric {
      background: var(--bg-secondary);
      padding: 1rem;
      border-radius: 8px;
      border: 1px solid var(--border-primary);
    }

    .validation-metric-label {
      font-size: 0.75rem;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .validation-metric-value {
      font-size: 1.5rem;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
    }

    .insights-list {
      list-style: none;
    }

    .insight-item {
      padding: 0.75rem;
      background: var(--bg-secondary);
      border-radius: 8px;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
    }

    .insight-icon {
      flex-shrink: 0;
      margin-top: 0.125rem;
    }

    .analyzing {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding: 2rem;
      color: var(--text-secondary);
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid var(--border-primary);
      border-top-color: var(--accent-primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .header-content {
        padding: 0 1rem;
        height: 56px;
      }

      .stats-content {
        padding: 0 1rem;
      }

      .main {
        padding: 1rem;
      }

      .ideas-grid {
        grid-template-columns: 1fr;
      }

      .modal-content {
        width: 95%;
        margin: 1rem auto;
      }

      .modal-header,
      .modal-body {
        padding: 1rem 1.5rem;
      }

      .logo-text {
        display: none;
      }

      .btn span.btn-text {
        display: none;
      }

      .validation-grid {
        grid-template-columns: 1fr;
      }

      #userBadge {
        display: none !important;
      }
    }
  </style>
</head>
<body>
  <!-- Login Page -->
  <div id="loginPage" style="display: none; min-height: 100vh; align-items: center; justify-content: center; padding: 2rem;">
    <div style="background: var(--bg-secondary); border: 1px solid var(--border-primary); border-radius: 16px; padding: 2.5rem 2rem; width: 100%; max-width: 420px; box-shadow: 0 24px 64px rgba(0, 0, 0, 0.6);">
      <div style="text-align: center; margin-bottom: 2rem;">
        <div style="width: 64px; height: 64px; margin: 0 auto 1rem; background: var(--accent-primary); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 2rem;">⚡</div>
        <h1 style="font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem;">SparkLane</h1>
        <p style="color: var(--text-secondary); font-size: 0.95rem;">Sign in to access your ideas</p>
      </div>
      <div id="loginError" style="display: none; background: rgba(239, 68, 68, 0.15); border: 1px solid var(--error); color: var(--error); padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.875rem; margin-bottom: 1.25rem;"></div>
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div style="margin-bottom: 1.25rem;">
          <label style="display: block; font-size: 0.875rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em;">Email</label>
          <input type="email" id="loginEmail" placeholder="you@example.com" required autocomplete="email" style="width: 100%; background: var(--bg-tertiary); border: 1px solid var(--border-primary); color: var(--text-primary); padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.95rem; font-family: inherit; transition: all 0.2s;">
        </div>
        <div style="margin-bottom: 1.25rem;">
          <label style="display: block; font-size: 0.875rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em;">Password</label>
          <input type="password" id="loginPassword" placeholder="••••••••" required autocomplete="current-password" style="width: 100%; background: var(--bg-tertiary); border: 1px solid var(--border-primary); color: var(--text-primary); padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.95rem; font-family: inherit; transition: all 0.2s;">
        </div>
        <button type="submit" id="loginBtn" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem; justify-content: center;">Sign In</button>
      </form>
    </div>
  </div>

  <!-- App Shell -->
  <div id="appShell" style="display: none;">
  <!-- Header -->
  <header class="header" id="header">
    <div class="header-content">
      <a href="#" class="logo" onclick="return false">
        <div class="logo-icon">⚡</div>
        <span class="logo-text">SparkLane</span>
      </a>
      
      <div class="header-actions">
        <span id="userBadge" style="font-size: 0.8rem; color: var(--text-tertiary); display: none;"></span>
        <button class="btn btn-small" onclick="handleLogout()" style="display: none;" id="logoutBtn">Sign out</button>
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" class="search-input" placeholder="Search ideas..." id="searchInput">
        </div>
        <button class="btn btn-primary" onclick="openModal()">
          <span>✨</span>
          <span class="btn-text">New Spark</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Stats Bar -->
  <div class="stats-bar">
    <div class="stats-content" id="statsBar"></div>
  </div>

  <!-- Main Content -->
  <main class="main">
    <!-- Filters -->
    <div class="filters" id="filters"></div>

    <!-- Ideas Grid -->
    <div class="ideas-grid" id="ideasGrid"></div>
  </main>

  <!-- Modal -->
  <div class="modal" id="modal">
    <div class="modal-backdrop" onclick="closeModal()"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">New Spark</h2>
        <div class="modal-actions">
          <button class="btn" id="deleteBtn" onclick="deleteIdea()" style="display: none;">🗑️</button>
          <button class="btn" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick="saveIdea()">Save</button>
        </div>
      </div>
      <div class="modal-body">
        <div class="modal-tabs">
          <button class="tab active" onclick="switchTab('details')">Details</button>
          <button class="tab" onclick="switchTab('validation')" id="validationTab">AI Validation</button>
        </div>

        <!-- Details Tab -->
        <div class="tab-content active" id="detailsTab">
          <div class="form-group">
            <label class="form-label" for="ideaTitle">Title</label>
            <input type="text" class="form-input" id="ideaTitle" placeholder="What's the spark?" maxlength="200">
            <div class="char-count"><span id="titleCount">0</span>/200</div>
          </div>
          <div class="form-group">
            <label class="form-label" for="ideaDescription">Description</label>
            <textarea class="form-textarea" id="ideaDescription" placeholder="Capture the details, the why, the how..."></textarea>
          </div>
          <div class="form-group">
            <label class="form-label" for="ideaStatus">Status</label>
            <select class="form-select" id="ideaStatus">
              <option value="raw">🌱 Raw - Just captured</option>
              <option value="brewing">🧪 Brewing - Thinking it through</option>
              <option value="validated">✅ Validated - Proven concept</option>
              <option value="mvp">🚀 MVP - Building it</option>
              <option value="shipped">🎉 Shipped - Live in the world</option>
            </select>
          </div>
        </div>

        <!-- Validation Tab -->
        <div class="tab-content" id="validationTabContent">
          <div id="validationContent">
            <div class="validation-panel">
              <div class="validation-header">
                <h3 class="validation-title">AI Analysis</h3>
                <button class="btn btn-primary btn-small" onclick="analyzeIdea()" id="analyzeBtn">
                  <span>🤖</span>
                  <span>Analyze</span>
                </button>
              </div>
              <p style="color: var(--text-secondary); font-size: 0.875rem;">
                Get AI-powered insights on market size, competition, feasibility, and validation score.
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  </div>

  <!-- PocketBase SDK (ESM via CDN) -->
  <script type="module">
    import PocketBase from 'https://cdn.jsdelivr.net/npm/pocketbase@0.21.3/dist/pocketbase.es.mjs';

    // ========================================
    // CONFIGURATION
    // ========================================
    const PB_URL = 'https://db.prasannar.com';
    const pb = new PocketBase(PB_URL);
    pb.autoCancellation(false);
    // ========================================

    let ideas = [];
    let currentEditId = null;
    let currentFilter = 'all';
    let aiAnalyzing = false;

    // Auth helpers
    function isLoggedIn() {
      return pb.authStore.isValid;
    }

    function showLogin() {
      document.getElementById('loginPage').style.display = 'flex';
      document.getElementById('appShell').style.display = 'none';
    }

    function showApp() {
      document.getElementById('loginPage').style.display = 'none';
      document.getElementById('appShell').style.display = 'block';
      const email = pb.authStore.model?.email ?? '';
      const userBadge = document.getElementById('userBadge');
      const logoutBtn = document.getElementById('logoutBtn');
      if (userBadge) {
        userBadge.textContent = email;
        userBadge.style.display = 'block';
      }
      if (logoutBtn) {
        logoutBtn.style.display = 'inline-flex';
      }
    }

    // Login handler
    window.handleLogin = async function(e) {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const btn = document.getElementById('loginBtn');
      const errEl = document.getElementById('loginError');

      errEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Signing in…';

      try {
        await pb.collection('users').authWithPassword(email, password);
        showApp();
        await loadIdeas();
      } catch (err) {
        const msg = err?.response?.message || 'Invalid email or password.';
        errEl.textContent = msg;
        errEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    };

    // Logout handler
    window.handleLogout = function() {
      pb.authStore.clear();
      showLogin();
      document.getElementById('loginEmail').value = '';
      document.getElementById('loginPassword').value = '';
      ideas = [];
      renderStats();
      renderIdeas();
    };

    // Initialize
    async function init() {
      if (isLoggedIn()) {
        showApp();
        await loadIdeas();
      } else {
        showLogin();
      }
      renderFilters();
      setupEventListeners();
    };

    // Event Listeners
    function setupEventListeners() {
      document.getElementById('searchInput').addEventListener('input', (e) => {
        renderIdeas(e.target.value);
      });

      document.getElementById('ideaTitle').addEventListener('input', (e) => {
        document.getElementById('titleCount').textContent = e.target.value.length;
      });

      window.addEventListener('scroll', () => {
        const header = document.getElementById('header');
        if (window.scrollY > 0) {
          header.classList.add('elevated');
        } else {
          header.classList.remove('elevated');
        }
      });

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && document.getElementById('modal').classList.contains('active')) {
          closeModal();
        }
      });
    }

    // Load ideas from PocketBase
    async function loadIdeas() {
      try {
        const records = await pb.collection('brew_ideas').getFullList({
          sort: '-created',
        });
        
        // Parse validation JSON if it exists
        ideas = records.map(record => ({
          ...record,
          validation: record.validation ? (typeof record.validation === 'string' ? JSON.parse(record.validation) : record.validation) : null
        }));
        
        renderStats();
        renderIdeas();
      } catch (error) {
        console.error('Error loading ideas:', error);
        if (error?.status === 401 || error?.status === 403) {
          pb.authStore.clear();
          showLogin();
        } else {
          alert('Failed to load ideas. Check console.');
        }
        ideas = [];
        renderStats();
        renderIdeas();
      }
    }

    // Render stats
    function renderStats() {
      const stats = {
        raw: ideas.filter(i => i.status === 'raw').length,
        brewing: ideas.filter(i => i.status === 'brewing').length,
        validated: ideas.filter(i => i.status === 'validated').length,
        mvp: ideas.filter(i => i.status === 'mvp').length,
        shipped: ideas.filter(i => i.status === 'shipped').length,
      };

      const statsBar = document.getElementById('statsBar');
      statsBar.innerHTML = `
        <div class="stat-item" onclick="setFilter('raw')">
          <div class="stat-icon raw">🌱</div>
          <div class="stat-info">
            <div class="stat-label">Raw</div>
            <div class="stat-value">${stats.raw}</div>
          </div>
        </div>
        <div class="stat-item" onclick="setFilter('brewing')">
          <div class="stat-icon brewing">🧪</div>
          <div class="stat-info">
            <div class="stat-label">Brewing</div>
            <div class="stat-value">${stats.brewing}</div>
          </div>
        </div>
        <div class="stat-item" onclick="setFilter('validated')">
          <div class="stat-icon validated">✅</div>
          <div class="stat-info">
            <div class="stat-label">Validated</div>
            <div class="stat-value">${stats.validated}</div>
          </div>
        </div>
        <div class="stat-item" onclick="setFilter('mvp')">
          <div class="stat-icon mvp">🚀</div>
          <div class="stat-info">
            <div class="stat-label">MVP</div>
            <div class="stat-value">${stats.mvp}</div>
          </div>
        </div>
        <div class="stat-item" onclick="setFilter('shipped')">
          <div class="stat-icon shipped">🎉</div>
          <div class="stat-info">
            <div class="stat-label">Shipped</div>
            <div class="stat-value">${stats.shipped}</div>
          </div>
        </div>
      `;
    }

    // Render filters
    function renderFilters() {
      const filters = document.getElementById('filters');
      const filterOptions = [
        { value: 'all', label: 'All Ideas' },
        { value: 'raw', label: '🌱 Raw' },
        { value: 'brewing', label: '🧪 Brewing' },
        { value: 'validated', label: '✅ Validated' },
        { value: 'mvp', label: '🚀 MVP' },
        { value: 'shipped', label: '🎉 Shipped' },
      ];

      filters.innerHTML = filterOptions.map(filter => `
        <button class="filter-pill ${currentFilter === filter.value ? 'active' : ''}" 
                onclick="setFilter('${filter.value}')">
          ${filter.label}
        </button>
      `).join('');
    }

    // Set filter
    function setFilter(filter) {
      currentFilter = filter;
      renderFilters();
      renderIdeas();
    }

    // Render ideas
    function renderIdeas(searchQuery = '') {
      const grid = document.getElementById('ideasGrid');
      
      let filtered = ideas;
      
      if (currentFilter !== 'all') {
        filtered = filtered.filter(i => i.status === currentFilter);
      }

      if (searchQuery) {
        const query = searchQuery.toLowerCase();
        filtered = filtered.filter(i => 
          i.title.toLowerCase().includes(query) || 
          (i.description && i.description.toLowerCase().includes(query))
        );
      }

      if (filtered.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">💡</div>
            <h2>${searchQuery ? 'No matches found' : 'No sparks yet'}</h2>
            <p>${searchQuery ? 'Try a different search term' : 'Click "New Spark" above to capture your first idea'}</p>
          </div>
        `;
        return;
      }

      grid.innerHTML = filtered.map((idea, index) => {
        const date = new Date(idea.created).toLocaleDateString('en-US', {
          month: 'short',
          day: 'numeric',
          year: 'numeric'
        });

        const statusEmoji = {
          raw: '🌱',
          brewing: '🧪',
          validated: '✅',
          mvp: '🚀',
          shipped: '🎉'
        };

        let validationHTML = '';
        if (idea.validation) {
          const scoreClass = idea.validation.score >= 75 ? 'score-high' : 
                            idea.validation.score >= 50 ? 'score-medium' : 'score-low';
          validationHTML = `
            <div class="validation-score">
              <div class="score-circle ${scoreClass}">${idea.validation.score}</div>
              <div class="score-info">
                <div class="score-label">Validation Score</div>
                <div class="score-metrics">
                  ${idea.validation.metrics ? `
                    <span class="metric-tag">${idea.validation.metrics.marketSize}</span>
                    <span class="metric-tag">${idea.validation.metrics.competitors} competitors</span>
                    <span class="metric-tag">${idea.validation.metrics.difficulty}</span>
                  ` : ''}
                </div>
              </div>
            </div>
          `;
        }

        return `
          <div class="idea-card" onclick="openModal('${idea.id}')" style="animation-delay: ${index * 0.05}s">
            <div class="card-header">
              <h3 class="idea-title">${escapeHtml(idea.title)}</h3>
              <div class="status-indicator ${idea.status}"></div>
            </div>
            ${idea.description ? `<div class="idea-description">${escapeHtml(idea.description)}</div>` : ''}
            ${validationHTML}
            <div class="card-footer">
              <span class="status-badge ${idea.status}">
                <span>${statusEmoji[idea.status]}</span>
                <span>${idea.status}</span>
              </span>
              <span class="idea-date">${date}</span>
            </div>
          </div>
        `;
      }).join('');
    }

    // Switch tabs
    function switchTab(tabName) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      
      event.target.classList.add('active');
      
      if (tabName === 'details') {
        document.getElementById('detailsTab').classList.add('active');
      } else if (tabName === 'validation') {
        document.getElementById('validationTabContent').classList.add('active');
        renderValidation();
      }
    }

    // Render validation panel
    function renderValidation() {
      const idea = currentEditId ? ideas.find(i => i.id === currentEditId) : null;
      const content = document.getElementById('validationContent');

      if (!idea || !idea.validation) {
        return;
      }

      const scoreClass = idea.validation.score >= 75 ? 'score-high' : 
                        idea.validation.score >= 50 ? 'score-medium' : 'score-low';

      content.innerHTML = `
        <div class="validation-panel">
          <div class="validation-header">
            <h3 class="validation-title">Validation Report</h3>
            <button class="btn btn-primary btn-small" onclick="analyzeIdea()">
              <span>🔄</span>
              <span>Re-analyze</span>
            </button>
          </div>

          <div class="validation-grid">
            <div class="validation-metric">
              <div class="validation-metric-label">Score</div>
              <div class="validation-metric-value" style="color: ${
                idea.validation.score >= 75 ? 'var(--success)' : 
                idea.validation.score >= 50 ? 'var(--warning)' : 'var(--error)'
              }">${idea.validation.score}</div>
            </div>
            ${idea.validation.metrics ? `
              <div class="validation-metric">
                <div class="validation-metric-label">Market</div>
                <div class="validation-metric-value" style="font-size: 1.125rem;">${idea.validation.metrics.marketSize}</div>
              </div>
              <div class="validation-metric">
                <div class="validation-metric-label">Competition</div>
                <div class="validation-metric-value" style="font-size: 1.125rem;">${idea.validation.metrics.competitors}</div>
              </div>
              <div class="validation-metric">
                <div class="validation-metric-label">Difficulty</div>
                <div class="validation-metric-value" style="font-size: 1.125rem;">${idea.validation.metrics.difficulty}</div>
              </div>
            ` : ''}
          </div>

          ${idea.validation.insights && idea.validation.insights.length > 0 ? `
            <div style="margin-top: 1.5rem;">
              <h4 style="font-size: 0.875rem; font-weight: 700; margin-bottom: 0.75rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em;">Key Insights</h4>
              <ul class="insights-list">
                ${idea.validation.insights.map(insight => `
                  <li class="insight-item">
                    <span class="insight-icon">💡</span>
                    <span>${insight}</span>
                  </li>
                `).join('')}
              </ul>
            </div>
          ` : ''}
        </div>
      `;
    }

    // Analyze idea (mock AI)
    async function analyzeIdea() {
      const title = document.getElementById('ideaTitle').value.trim();
      const description = document.getElementById('ideaDescription').value.trim();

      if (!title) {
        alert('Add a title first');
        return;
      }

      const analyzeBtn = document.getElementById('analyzeBtn');
      analyzeBtn.disabled = true;
      analyzeBtn.innerHTML = '<div class="spinner"></div><span>Analyzing...</span>';

      document.getElementById('validationContent').innerHTML = `
        <div class="analyzing">
          <div class="spinner"></div>
          <span>Analyzing your idea with AI...</span>
        </div>
      `;

      // Simulate AI analysis
      await new Promise(resolve => setTimeout(resolve, 2500));

      const score = Math.floor(Math.random() * 30) + 65;
      const validation = {
        score,
        marketSize: ['Small', 'Medium', 'Large'][Math.floor(Math.random() * 3)],
        competition: ['Low', 'Medium', 'High'][Math.floor(Math.random() * 3)],
        feasibility: ['Low', 'Medium', 'High'][Math.floor(Math.random() * 3)],
        insights: [
          'Market shows strong growth potential',
          'Technology requirements are achievable',
          'Consider focusing on a specific niche first'
        ],
        metrics: {
          marketSize: `$${(Math.random() * 100 + 10).toFixed(1)}B`,
          competitors: `${Math.floor(Math.random() * 30 + 5)}+`,
          difficulty: ['Low', 'Medium', 'High'][Math.floor(Math.random() * 3)]
        }
      };

      if (currentEditId) {
        const idea = ideas.find(i => i.id === currentEditId);
        idea.validation = validation;
        idea.updated = new Date().toISOString();
        
        // Save to PocketBase
        try {
          await pb.collection('brew_ideas').update(currentEditId, {
            validation: JSON.stringify(validation)
          });
          await loadIdeas();
        } catch (error) {
          console.error('Error saving validation:', error);
        }
      }

      renderValidation();

      analyzeBtn.disabled = false;
      analyzeBtn.innerHTML = '<span>🤖</span><span>Analyze</span>';
    }

    // Open modal
    function openModal(id = null) {
      currentEditId = id;
      const modal = document.getElementById('modal');
      const deleteBtn = document.getElementById('deleteBtn');
      
      // Reset tabs
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.querySelectorAll('.tab')[0].classList.add('active');
      document.getElementById('detailsTab').classList.add('active');
      
      if (id) {
        const idea = ideas.find(i => i.id === id);
        document.getElementById('modalTitle').textContent = 'Edit Spark';
        document.getElementById('ideaTitle').value = idea.title;
        document.getElementById('titleCount').textContent = idea.title.length;
        document.getElementById('ideaDescription').value = idea.description || '';
        document.getElementById('ideaStatus').value = idea.status;
        deleteBtn.style.display = 'block';
        
        if (idea.validation) {
          document.getElementById('validationTab').innerHTML = '✨ AI Validation';
        }
      } else {
        document.getElementById('modalTitle').textContent = 'New Spark';
        document.getElementById('ideaTitle').value = '';
        document.getElementById('titleCount').textContent = '0';
        document.getElementById('ideaDescription').value = '';
        document.getElementById('ideaStatus').value = 'raw';
        deleteBtn.style.display = 'none';
        document.getElementById('validationTab').innerHTML = 'AI Validation';
        
        // Reset validation content
        document.getElementById('validationContent').innerHTML = `
          <div class="validation-panel">
            <div class="validation-header">
              <h3 class="validation-title">AI Analysis</h3>
              <button class="btn btn-primary btn-small" onclick="analyzeIdea()" id="analyzeBtn">
                <span>🤖</span>
                <span>Analyze</span>
              </button>
            </div>
            <p style="color: var(--text-secondary); font-size: 0.875rem;">
              Get AI-powered insights on market size, competition, feasibility, and validation score.
            </p>
          </div>
        `;
      }
      
      modal.classList.add('active');
      setTimeout(() => document.getElementById('ideaTitle').focus(), 100);
    }

    // Close modal
    function closeModal() {
      document.getElementById('modal').classList.remove('active');
      currentEditId = null;
    }

    // Save idea
    async function saveIdea() {
      const title = document.getElementById('ideaTitle').value.trim();
      const description = document.getElementById('ideaDescription').value.trim();
      const status = document.getElementById('ideaStatus').value;

      if (!title) {
        alert('Title is required');
        document.getElementById('ideaTitle').focus();
        return;
      }

      try {
        const data = {
          title,
          description,
          status
        };

        if (currentEditId) {
          // Get current idea to preserve validation data
          const currentIdea = ideas.find(i => i.id === currentEditId);
          if (currentIdea && currentIdea.validation) {
            data.validation = JSON.stringify(currentIdea.validation);
          }
          await pb.collection('brew_ideas').update(currentEditId, data);
        } else {
          await pb.collection('brew_ideas').create(data);
        }
        
        await loadIdeas();
        closeModal();
      } catch (error) {
        console.error('Error saving idea:', error);
        const msg = error?.response?.message || 'Failed to save idea. Try again.';
        alert(msg);
      }
    }

    // Delete idea
    async function deleteIdea() {
      if (!currentEditId) return;
      if (!confirm('Delete this spark permanently?')) return;

      try {
        await pb.collection('brew_ideas').delete(currentEditId);
        await loadIdeas();
        closeModal();
      } catch (error) {
        console.error('Error deleting idea:', error);
        alert('Failed to delete idea. Try again.');
      }
    }

    // Escape HTML
    function escapeHtml(text) {
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      };
      return text.replace(/[&<>"']/g, m => map[m]);
    }

    // Expose functions to window for onclick handlers
    window.openModal = openModal;
    window.closeModal = closeModal;
    window.saveIdea = saveIdea;
    window.deleteIdea = deleteIdea;
    window.switchTab = switchTab;
    window.analyzeIdea = analyzeIdea;
    window.setFilter = setFilter;
    window.escapeHtml = escapeHtml;

    // Initialize
    init();
  </script>
</body>
</html>
